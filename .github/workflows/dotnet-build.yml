name: .NET build and test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test cloud and dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Display .NET information
        run: dotnet --info

      - name: Build Azure Function
        run: dotnet build ./cloud/HiveWatch.TelemetryIngestor/HiveWatch.TelemetryIngestor.csproj --configuration Release

      - name: Build dashboard
        run: dotnet build ./dashboard/HiveWatch.Dashboard/HiveWatch.Dashboard.csproj --configuration Release

      - name: Test dashboard logic
        run: dotnet test ./dashboard/HiveWatch.Dashboard.Tests/HiveWatch.Dashboard.Tests.csproj --configuration Release
